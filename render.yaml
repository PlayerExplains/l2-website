# Render Blueprint — deploy API + static frontend from one repo.
# Dashboard → New → Blueprint → connect this repository.
# Set secret env vars (DB_*, CORS_ORIGIN, VITE_API_URL) when prompted.

services:
  - type: web
    name: l2website-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: XP_RATE
        value: "50"
      - key: SP_RATE
        value: "50"
      - key: ADENA_RATE
        value: "30"
      - key: DROP_RATE
        value: "5"
      - key: SPOIL_RATE
        value: "5"
      - key: ENCHANT_RATE
        value: "1"
      - key: RAIDBOSS_RATE
        value: "1"
      - key: QUEST_RATE
        value: "50"
      - key: DUALBOX
        value: disabled

  - type: web
    name: l2website
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_DISCORD_URL
        sync: false
      - key: VITE_DOWNLOAD_URL
        sync: false
